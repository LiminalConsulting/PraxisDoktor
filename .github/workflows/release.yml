name: Build & Release Windows EXE

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build PraxisDoktorSetup.exe
        run: |
          pyinstaller --onefile --name PraxisDoktorSetup --noconsole installer_gui.py

      - name: Build PraxisDoktor.exe (launcher)
        run: |
          pyinstaller --onefile --name PraxisDoktor --noconsole launcher.py

      - name: Download Ollama installer
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://ollama.com/download/OllamaSetup.exe" `
            -OutFile "dist\OllamaSetup.exe"

      - name: Copy ANLEITUNG.txt
        run: copy ANLEITUNG.txt dist\ANLEITUNG.txt

      - name: Bundle app source
        shell: powershell
        run: |
          # Copy app source into dist\app\ (excluding build artifacts)
          $src = "."
          $dst = "dist\app"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          $exclude = @('.git','__pycache__','*.pyc','audio','logs','dist','build','*.spec','*.db','*.exe')
          Get-ChildItem -Path $src -Exclude $exclude | ForEach-Object {
            Copy-Item $_.FullName -Destination $dst -Recurse -Force
          }

      - name: Create release ZIP
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive `
            -Path dist\PraxisDoktorSetup.exe, dist\PraxisDoktor.exe, dist\OllamaSetup.exe, dist\ANLEITUNG.txt, dist\app `
            -DestinationPath "PraxisDoktor-$tag.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "PraxisDoktor-*.zip"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
